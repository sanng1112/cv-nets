model:
  name: 1
  input_dim: 784
  hidden_dim: 512
  output_dim: 10


  fc1:
    type: "LinearLayer"
    in_features: 784
    out_features: 512
    bias: true
    linear-init: "xavier_uniform"
    linear-init-std-dev: 0.02
  
  act1:
    type: "relu"
    inplace: true
    neg-slope: 0.1
  

  fc2:
    type: "LinearLayer"
    in_features: 512
    out_features: 10
    
    bias: false
    linear-init: "xavier_normal"
    linear-init-std-dev: 0.01


  train:
    dropout:
      p: 0.6
      inplace: false
