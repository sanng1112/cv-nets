model:
  name: Recognize_Emotions
  input_size : [1, 48, 48]
  output_dim: 7

  layers:

    conv1:
      type: "Conv2d"
      in_channels: 1
      out_channels: 16
      kernel_size: 3
      stride: 1
      padding: 1

    bnorm1:
      type: "batch_norm_2d"
      num_features: 16
      
    act1:
      type: "leaky_relu"
      inplace: true
      neg_slope: 0.01  

    




  train:
    dropout:
      p: 0.5
      inplace: false

